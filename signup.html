<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zephyraen Text RPG - Signup</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="auth-wrap">
      <section class="auth-card">
        <h1>ZEPHYRAEN</h1>
        <p class="subtitle">Create Account</p>
        <p id="authStatusMessage" class="auth-status" aria-live="polite"></p>

        <form id="signupForm" class="auth-form" novalidate>
          <div class="auth-field">
            <label for="signupEmail">Email</label>
            <input id="signupEmail" name="email" type="text" />
            <p id="signupEmailMessage" class="field-message" aria-live="polite"></p>
          </div>

          <div class="auth-field">
            <label for="signupPassword">Password</label>
            <input id="signupPassword" name="password" type="password" />
            <p id="signupPasswordMessage" class="field-message" aria-live="polite"></p>
          </div>

          <div class="auth-field">
            <label for="signupConfirmPassword">Confirm Password</label>
            <input id="signupConfirmPassword" name="confirmPassword" type="password" />
            <p id="signupConfirmPasswordMessage" class="field-message" aria-live="polite"></p>
          </div>

          <button type="submit" class="option-btn" formnovalidate>Signup</button>
          <button type="button" id="goLoginBtn" class="option-btn">Go to Login</button>
        </form>
      </section>
    </main>

    <script type="module" src="auth.js?v=20260302h"></script>
  </body>
</html>
